# from https://github.com/kubeflow/training-operator/blob/master/examples/pytorch/simple.yaml
# and disabled istio as stated in the documentation https://www.kubeflow.org/docs/components/training/user-guides/pytorch/
apiVersion: "kubeflow.org/v1"
kind: PyTorchJob
metadata:
  name: pytorch-simple
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            sidecar.istio.io/inject: "false"
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: pytorch
            image: docker.io/kubeflowkatib/pytorch-mnist:v1beta1-45c5727
            imagePullPolicy: Always
            # workingDir: /tmp is used as a writable directory workaround under PSS Restricted
            # (read-only root fs in base image). Safe for short-running stateless test pods.
            workingDir: /tmp
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              runAsNonRoot: true
              runAsUser: 1000
              seccompProfile:
                type: RuntimeDefault
            command:
            - "python3"
            - "/opt/pytorch-mnist/mnist.py"
            - "--epochs=1"
            - "--no-cuda"
            - "--batch-size=32"
            - "--log-interval=50"
            - "--lr=0.01"
            - "--test-batch-size=1000"
            env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: OMP_NUM_THREADS
              value: "1"
            - name: CUDA_VISIBLE_DEVICES
              value: ""
            - name: MALLOC_TRIM_THRESHOLD_
              value: "0"
            - name: MALLOC_MMAP_MAX_
              value: "0"
            resources:
              requests:
                memory: "512Mi"
                cpu: "300m"
              limits:
                memory: "1Gi"
                cpu: "4000m"
    Worker:
      replicas: 1
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            sidecar.istio.io/inject: "false"
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          initContainers:
          # Use reproducible, pinned stable busybox image for network probe
          - name: init-pytorch
            image: busybox:1.36.1
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              runAsNonRoot: true
              runAsUser: 1000
              seccompProfile:
                type: RuntimeDefault
            command:
            - sh
            - -c
            - until nslookup pytorch-simple-master-0; do echo waiting for master; sleep 2; done;
          containers:
          - name: pytorch
            image: docker.io/kubeflowkatib/pytorch-mnist:v1beta1-45c5727
            imagePullPolicy: Always
            # workingDir: /tmp is used as a writable directory workaround under PSS Restricted
            # (read-only root fs in base image). Safe for short-running stateless test pods.
            workingDir: /tmp
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              runAsNonRoot: true
              runAsUser: 1000
              seccompProfile:
                type: RuntimeDefault
            command:
            - "python3"
            - "/opt/pytorch-mnist/mnist.py"
            - "--epochs=1"
            - "--no-cuda"
            - "--batch-size=32"
            - "--log-interval=50"
            - "--lr=0.01"
            - "--test-batch-size=1000"
            env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: OMP_NUM_THREADS
              value: "1"
            - name: CUDA_VISIBLE_DEVICES
              value: ""
            - name: MALLOC_TRIM_THRESHOLD_
              value: "0"
            - name: MALLOC_MMAP_MAX_
              value: "0"
            resources:
              requests:
                memory: "512Mi"
                cpu: "300m"
              limits:
                memory: "1Gi"
                cpu: "4000m"
