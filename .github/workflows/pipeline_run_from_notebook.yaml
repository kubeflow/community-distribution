name: Test Pipeline run from Jupyterlab
on:
  pull_request:
    paths:
    - tests/install_KinD_create_KinD_cluster_install_kustomize.sh
    - .github/workflows/pipeline_run_from_notebook.yaml
    - applications/notebooks-v1/**
    - applications/pipeline/upstream/**
    - tests/istio*
    - tests/dashboard_install.sh
    - tests/notebooks_install.sh
    - tests/multi_tenancy_install.sh
    - tests/cert_manager_install.sh
    - common/cert-manager/**
    - common/oauth2-proxy/**
    - common/istio*/**
    - tests/pipeline*
    - tests/kubeflow_profile_install.sh
    - tests/PSS_enable.sh
    - common/kubeflow-namespace/**

permissions:
  contents: read
  actions: read
jobs:
  pipeline_run_from_notebook:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Install KinD, Create KinD cluster and Install kustomize
      run: ./tests/install_KinD_create_KinD_cluster_install_kustomize.sh

    - name: Create kubeflow namespace
      run: kustomize build common/kubeflow-namespace/base | kubectl apply -f -

    - name: Install Istio
      run: ./tests/istio-cni_install.sh

    - name: Install oauth2-proxy
      run: ./tests/oauth2-proxy_install.sh

    - name: Install cert-manager
      run: ./tests/cert_manager_install.sh

    - name: Install Kubeflow Istio Resources
      run: kustomize build common/istio/kubeflow-istio-resources/base | kubectl apply -f -

    - name: Install Multi-Tenancy
      run: ./tests/multi_tenancy_install.sh

    - name: Install KF Pipelines
      run: ./tests/pipelines_install.sh

    - name: Install Dashboard
      run: ./tests/dashboard_install.sh

    - name: Install Notebooks v1
      run: ./tests/notebooks_install.sh

    - name: Create KF Profile
      run: ./tests/kubeflow_profile_install.sh

    - name: Apply PodDefaults to access ml-pipeline with projected token
      run: kubectl apply -f tests/poddefaults.access-ml-pipeline.kubeflow-user-example-com.yaml

    - name: Create Kubeflow Notebook with PodDefaults
      run: |
        kubectl apply -f tests/notebook.test.kubeflow-user-example.com.yaml
        kubectl wait --for=jsonpath='{.status.readyReplicas}'=1 \
          -f tests/notebook.test.kubeflow-user-example.com.yaml \
          --timeout 600s

    - name: Copy and execute the pipeline run script in KF Notebook
      run: |
        kubectl -n kubeflow-user-example-com cp \
          ./tests/pipeline_run_and_wait_kubeflow.py \
          test-0:/home/jovyan/pipeline_run_and_wait_kubeflow.py

        kubectl -n kubeflow-user-example-com exec -ti \
          test-0 -- python /home/jovyan/pipeline_run_and_wait_kubeflow.py

    - name: Apply Pod Security Standards restricted levels
      run: ./tests/PSS_enable.sh

    - name: Collect Logs on Failure
      if: failure()
      run: |
        mkdir -p logs
        kubectl get all --all-namespaces > logs/resources.txt
        kubectl get events --all-namespaces --sort-by=.metadata.creationTimestamp > logs/events.txt
        kubectl get notebook test -n kubeflow-user-example-com -o yaml > logs/notebook-test.yaml 2>&1 || true
        for namespace in kubeflow kubeflow-user-example-com istio-system cert-manager auth; do
            kubectl describe pods -n $namespace > logs/$namespace-pods.txt 2>&1 || true
            for pod in $(kubectl get pods -n $namespace -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true); do
                kubectl logs -n $namespace $pod --tail=100 > logs/$namespace-$pod.txt 2>&1 || true
            done
        done

    - name: Upload Diagnostic Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kubeflow-test-logs
        path: logs/
