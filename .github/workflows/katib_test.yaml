name: Deploy and Test Katib
on:
  pull_request:
    paths:
    - tests/install_KinD_create_KinD_cluster_install_kustomize.sh
    - tests/katib*
    - .github/workflows/katib_test.yaml
    - applications/katib/upstream/**
    - common/istio*/**
    - tests/istio*
    - tests/multi_tenancy_install.sh
    - tests/profile_controller_install.sh
    - applications/dashboard/upstream/profile-controller/**
    - common/cert-manager/**
    - applications/katib/overlays/**
    - tests/kubeflow_profile_install.sh
    - tests/PSS_enable.sh

permissions:
  contents: read
  actions: read

env:
  KF_PROFILE: kubeflow-user-example-com

jobs:
  katib_test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install KinD, Create KinD cluster and Install kustomize
      run: ./tests/install_KinD_create_KinD_cluster_install_kustomize.sh

    - name: Create Kubeflow Namespace
      run: kustomize build common/kubeflow-namespace/base | kubectl apply -f -

    - name: Install Certificate Manager
      run: ./tests/cert_manager_install.sh

    - name: Install Istio CNI
      run: ./tests/istio-cni_install.sh

    - name: Install OAuth2 Proxy
      run: ./tests/oauth2-proxy_install.sh

    - name: Install Kubeflow Istio Resources
      run: kustomize build common/istio/kubeflow-istio-resources/base | kubectl apply -f -

    - name: Install Profile Controller
      run: ./tests/profile_controller_install.sh

    - name: Install Multi-Tenancy
      run: ./tests/multi_tenancy_install.sh

    - name: Create KF Profile
      run: ./tests/kubeflow_profile_install.sh

    - name: Install Katib
      run: ./tests/katib_install.sh

    - name: Port-forward the istio-ingress gateway
      run: ./tests/port_forward_gateway.sh

    - name: Run Katib Test
      run: ./tests/katib_test.sh "${KF_PROFILE}"

    - name: Test Authorized Katib Access
      run: kubectl get experiments.kubeflow.org -n $KF_PROFILE --token="$(kubectl -n $KF_PROFILE create token default-editor)"

    - name: Test Unauthorized Katib Access
      run: |
        kubectl create namespace test-unauthorized
        kubectl create serviceaccount test-unauthorized -n test-unauthorized
        UNAUTHORIZED_TOKEN=$(kubectl -n test-unauthorized create token test-unauthorized)
        kubectl get experiments.kubeflow.org -n $KF_PROFILE --token="$UNAUTHORIZED_TOKEN" >/dev/null

    - name: Apply Pod Security Standards restricted levels
      run: ./tests/PSS_enable.sh

    - name: Collect Logs on Failure
      if: failure()
      run: |
        mkdir -p logs
        kubectl get all --all-namespaces > logs/resources.txt
        kubectl get events --all-namespaces --sort-by=.metadata.creationTimestamp > logs/events.txt
        kubectl get experiments.kubeflow.org -n "${KF_PROFILE}" -o yaml > logs/katib-experiments.yaml 2>&1 || true
        kubectl get trials.kubeflow.org -n "${KF_PROFILE}" -o yaml > logs/katib-trials.yaml 2>&1 || true
        for namespace in kubeflow istio-system cert-manager auth kubeflow-user-example-com; do
            kubectl describe pods -n $namespace > logs/$namespace-pods.txt 2>&1 || true
            for pod in $(kubectl get pods -n $namespace -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true); do
                kubectl logs -n $namespace $pod --tail=100 > logs/$namespace-$pod.txt 2>&1 || true
            done
        done

    - name: Upload Diagnostic Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kubeflow-test-logs
        path: logs/
