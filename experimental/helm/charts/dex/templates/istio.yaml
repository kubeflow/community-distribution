{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: dex
  namespace: {{ include "dex.namespace" . }}
spec:
  gateways:
  - {{ include "dex.kubeflowNamespace" . }}/kubeflow-gateway
  hosts:
  - '*'
  http:
  - match:
    - uri:
        prefix: /dex/
    route:
    - destination:
        host: dex.{{ include "dex.namespace" . }}.svc.cluster.local
        port:
          number: 5556
{{- end }}
