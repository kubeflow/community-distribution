# Default values for the Kubeflow Istio wrapper chart.
#
# The safe default renders only Istio CRDs. Install the chart first with the
# CRD-only values, then upgrade with the base or oauth2-proxy values after the
# CRDs are available to the API server.

global:
  # -- Namespace for Istio control-plane workloads.
  istioNamespace: istio-system
  # -- Namespace for Kubeflow resources referenced by Istio Sidecar resources.
  kubeflowNamespace: kubeflow
  # -- Namespace for Istio CNI resources.
  kubeSystemNamespace: kube-system

crds:
  # -- Render Istio CustomResourceDefinition resources.
  enabled: true

namespace:
  # -- Render the Istio workload namespace.
  enabled: false

networkPolicies:
  # -- Render Istio namespace NetworkPolicy resources.
  enabled: false

install:
  # -- Render Istio control-plane, gateway, CNI, and Istio custom resources.
  enabled: false

oauth2Proxy:
  # -- Render the oauth2-proxy patched Istio install.
  enabled: false
  # -- oauth2-proxy extension provider service host.
  service: oauth2-proxy.oauth2-proxy.svc.cluster.local
  # -- oauth2-proxy extension provider service port.
  port: 80
