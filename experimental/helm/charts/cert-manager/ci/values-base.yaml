# CI values for upstream cert-manager base parity.
cert-manager:
  enabled: true
  crds:
    enabled: true
  namespace: cert-manager
  startupapicheck:
    enabled: false

namespaceResource:
  enabled: true

kubeflow:
  enabled: false
  clusterIssuer:
    enabled: false
  networkPolicies:
    enabled: false
