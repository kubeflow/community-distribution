# CI values for Kubeflow cert-manager parity.
cert-manager:
  enabled: true
  crds:
    enabled: true
  namespace: cert-manager
  startupapicheck:
    enabled: false

kubeflow:
  enabled: true
  clusterIssuer:
    enabled: true
    name: kubeflow-self-signing-issuer
  networkPolicies:
    enabled: true
