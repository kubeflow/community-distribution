{{- if .Values.oauth2Proxy.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oauth2-proxy
  namespace: {{ include "oauth2-proxy.namespace" . }}
---
apiVersion: v1
data:
  oauth2_proxy.cfg: |-
{{ .Files.Get "files/oauth2_proxy.cfg" | indent 4 }}
kind: ConfigMap
metadata:
  name: oauth2-proxy
  namespace: {{ include "oauth2-proxy.namespace" . }}
---
apiVersion: v1
data:
  ALLOW_SELF_SIGNED_ISSUER: {{ .Values.parameters.allowSelfSignedIssuer | quote }}
  ENABLE_M2M_TOKENS: {{ .Values.parameters.enableM2MTokens | quote }}
  EXTRA_JWT_ISSUERS: {{ .Values.parameters.extraJwtIssuers | quote }}
  FORCE_HTTPS: {{ .Values.parameters.forceHttps | quote }}
kind: ConfigMap
metadata:
  name: oauth2-proxy-parameters
  namespace: {{ include "oauth2-proxy.namespace" . }}
---
apiVersion: v1
data:
  kubeflow-logo.svg: |
{{ .Files.Get "files/kubeflow-logo.svg" | indent 4 }}
kind: ConfigMap
metadata:
  name: oauth2-proxy-theme
  namespace: {{ include "oauth2-proxy.namespace" . }}
---
apiVersion: v1
data:
  client-id: {{ .Values.credentials.clientID | b64enc }}
  client-secret: {{ .Values.credentials.clientSecret | b64enc }}
  cookie-secret: {{ .Values.credentials.cookieSecret | b64enc }}
kind: Secret
metadata:
  name: oauth2-proxy
  namespace: {{ include "oauth2-proxy.namespace" . }}
type: Opaque
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: {{ include "oauth2-proxy.namespace" . }}
spec:
  ports:
  - name: http
    port: 80
    targetPort: http
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: oauth2-proxy
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: oauth2-proxy
  name: oauth2-proxy
  namespace: {{ include "oauth2-proxy.namespace" . }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-proxy
    spec:
      containers:
      - args:
        - --http-address=0.0.0.0:4180
        - --config=/etc/oauth2_proxy/oauth2_proxy.cfg
        env:
        - name: OAUTH2_PROXY_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: client-id
              name: oauth2-proxy
        - name: OAUTH2_PROXY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: client-secret
              name: oauth2-proxy
        - name: OAUTH2_PROXY_COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              key: cookie-secret
              name: oauth2-proxy
        - name: OAUTH2_PROXY_COOKIE_SECURE
          valueFrom:
            configMapKeyRef:
              key: FORCE_HTTPS
              name: oauth2-proxy-parameters
        - name: OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY
          valueFrom:
            configMapKeyRef:
              key: ALLOW_SELF_SIGNED_ISSUER
              name: oauth2-proxy-parameters
        - name: OAUTH2_PROXY_SKIP_JWT_BEARER_TOKENS
          valueFrom:
            configMapKeyRef:
              key: ENABLE_M2M_TOKENS
              name: oauth2-proxy-parameters
        - name: OAUTH2_PROXY_EXTRA_JWT_ISSUERS
          valueFrom:
            configMapKeyRef:
              key: EXTRA_JWT_ISSUERS
              name: oauth2-proxy-parameters
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.14.3
        livenessProbe:
          httpGet:
            path: /ping
            port: http
            scheme: HTTP
        name: oauth2-proxy
        ports:
        - containerPort: 4180
          name: http
          protocol: TCP
        - containerPort: 44180
          name: metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /ready
            port: http
            scheme: HTTP
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /etc/oauth2_proxy/oauth2_proxy.cfg
          name: oauth2-proxy-config
          readOnly: true
          subPath: oauth2_proxy.cfg
        - mountPath: /custom-theme/kubeflow-logo.svg
          name: oauth2-proxy-theme
          readOnly: true
          subPath: kubeflow-logo.svg
      volumes:
      - configMap:
          name: oauth2-proxy
        name: oauth2-proxy-config
      - configMap:
          name: oauth2-proxy-theme
        name: oauth2-proxy-theme
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: oauth2-proxy
  namespace: {{ include "oauth2-proxy.namespace" . }}
spec:
  gateways:
  - {{ include "oauth2-proxy.kubeflowNamespace" . }}/kubeflow-gateway
  hosts:
  - '*'
  http:
  - match:
    - uri:
        prefix: /oauth2/
    route:
    - destination:
        host: oauth2-proxy.{{ include "oauth2-proxy.namespace" . }}.svc.cluster.local
        port:
          number: 80
{{- end }}
