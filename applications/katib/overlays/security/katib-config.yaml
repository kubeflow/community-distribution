---
apiVersion: config.kubeflow.org/v1beta1
kind: KatibConfig
init:
  controller:
    webhookPort: 8443
    trialResources:
    - TrainJob.v1alpha1.trainer.kubeflow.org
    - Job.v1.batch
    - TFJob.v1.kubeflow.org
    - PyTorchJob.v1.kubeflow.org
    - MPIJob.v1.kubeflow.org
    - XGBoostJob.v1.kubeflow.org
    injectSecurityContext: true
runtime:
  metricsCollectors:
  - kind: StdOut
    image: ghcr.io/kubeflow/katib/file-metrics-collector:v0.19.0
  - kind: File
    image: ghcr.io/kubeflow/katib/file-metrics-collector:v0.19.0
  - kind: TensorFlowEvent
    image: ghcr.io/kubeflow/katib/tfevent-metrics-collector:v0.19.0
    resources:
      limits:
        memory: 1Gi
  suggestions:
  - algorithmName: random
    image: ghcr.io/kubeflow/katib/suggestion-hyperopt:v0.19.0
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
  - algorithmName: tpe
    image: ghcr.io/kubeflow/katib/suggestion-hyperopt:v0.19.0
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
  - algorithmName: grid
    image: ghcr.io/kubeflow/katib/suggestion-optuna:v0.19.0
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
  - algorithmName: hyperband
    image: ghcr.io/kubeflow/katib/suggestion-hyperband:v0.19.0
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
  - algorithmName: bayesianoptimization
    image: ghcr.io/kubeflow/katib/suggestion-skopt:v0.19.0
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
  - algorithmName: cmaes
    image: ghcr.io/kubeflow/katib/suggestion-goptuna:v0.19.0
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
  - algorithmName: sobol
    image: ghcr.io/kubeflow/katib/suggestion-goptuna:v0.19.0
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
  - algorithmName: multivariate-tpe
    image: ghcr.io/kubeflow/katib/suggestion-optuna:v0.19.0
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
  - algorithmName: enas
    image: ghcr.io/kubeflow/katib/suggestion-enas:v0.19.0
    resources:
      limits:
        memory: 400Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
  - algorithmName: darts
    image: ghcr.io/kubeflow/katib/suggestion-darts:v0.19.0
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
  - algorithmName: pbt
    image: ghcr.io/kubeflow/katib/suggestion-pbt:v0.19.0
    persistentVolumeClaimSpec:
      accessModes:
      - ReadWriteMany
      resources:
        requests:
          storage: 5Gi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
  earlyStoppings:
  - algorithmName: medianstop
    image: ghcr.io/kubeflow/katib/earlystopping-medianstop:v0.19.0
