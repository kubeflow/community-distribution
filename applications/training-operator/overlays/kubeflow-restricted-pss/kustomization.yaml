apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kubeflow

resources:
- ../../upstream/overlays/kubeflow
- restricted-pytorch-init-container-configmap.yaml

patches:
- path: patches/training-operator-restricted-pytorch-init-container.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: training-operator
